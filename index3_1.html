<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kosmik Sayohat: 10 Bosqich</title>
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a0b2e; 
            font-family: 'Nunito', sans-serif; 
            user-select: none; 
            touch-action: none; 
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
        }

        /* Interactive elements need pointer events */
        #music-icon, .btn, #restart-btn, #player-name-input, #leaderboard {
            pointer-events: auto !important;
        }

        #video-container {
            position: absolute; bottom: 20px; right: 20px; 
            width: 200px; height: 150px;
            border-radius: 20px; border: 4px solid #00ffcc; z-index: 100; 
            background: #000; overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
            transform: scaleX(-1);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        #input-video { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; 
        }
        #output-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 2;
        }

        #status-message {
            position: absolute; 
            bottom: 180px; 
            right: 20px; 
            width: 200px;
            text-align: center;
            pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .message-bubble {
            background: rgba(0, 0, 0, 0.8);
            color: #00ffcc;
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            font-weight: bold;
            font-size: 1rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .message-bubble.visible { opacity: 1; transform: translateY(0); }

        #title-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }

        h1 { 
            font-family: 'Fredoka One', cursive; font-size: 2.2rem; 
            color: #fff; text-shadow: 0 4px 0 #6a0dad; margin: 0;
            background: rgba(0,0,0,0.4); padding: 8px 30px; border-radius: 30px;
            backdrop-filter: blur(5px); display: inline-block; border: 1px solid rgba(255,255,255,0.2);
        }

        #left-panel {
            position: absolute; top: 30px; left: 30px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: none;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #timer-display {
            font-family: 'Fredoka One', cursive;
            color: #ffd700; font-size: 1.8rem;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
        }

        #steps-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            justify-items: center;
        }
        
        .step-dot {
            width: 25px; height: 25px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fredoka One', cursive;
            color: #fff; font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .step-dot.active { background: #00ffcc; color: #000; transform: scale(1.2); box-shadow: 0 0 10px #00ffcc; border-color: #00ffcc; }
        .step-dot.completed { background: #00ff00; border-color: #00ff00; color: #000; }

        #progress-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #progress-label { color: #fff; font-size: 0.8rem; margin-bottom: 4px; opacity: 0.8; }

        #progress-container {
            width: 100%; height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px; border: 1px solid #fff;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00ff00, #adff2f);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00ff00;
        }

        #countdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 60;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: 'Fredoka One', cursive;
            font-size: 10rem; text-shadow: 0 0 40px #00ffcc;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }

        #music-icon {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 2rem; cursor: pointer; color: rgba(255,255,255,0.8);
            z-index: 150; transition: all 0.3s;
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 50%;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #music-icon:hover { color: #fff; transform: scale(1.1); background: rgba(0,0,0,0.6); border-color: #00ffcc; }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 10, 40, 0.98); z-index: 50; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
            transition: opacity 0.5s;
            pointer-events: auto;
        }
        
        .btn {
            background: linear-gradient(45deg, #00ccff, #0066ff); border: none; padding: 15px 40px;
            color: white; font-size: 1.5rem; border-radius: 50px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 6px 0 #0044cc, 0 10px 20px rgba(0,0,0,0.4); 
            font-family: 'Fredoka One', cursive;
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0044cc; }
        
        #player-name-input {
            padding: 12px 20px; font-size: 1.3rem; border-radius: 30px;
            border: 3px solid #00ffcc; background: rgba(0,0,0,0.6); color: #fff;
            text-align: center; outline: none; margin-bottom: 10px;
            font-family: 'Nunito', sans-serif; width: 80%; max-width: 300px;
            transition: all 0.3s;
        }
        #player-name-input:focus { box-shadow: 0 0 20px #00ffcc; transform: scale(1.02); }

        #leaderboard {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%; max-width: 450px; max-height: 250px; overflow-y: auto;
        }
        
        #leaderboard h2 { margin: 0 0 10px 0; color: #ffd700; font-size: 1.5rem; }

        .lb-row {
            display: flex; justify-content: space-between; padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1rem; color: #fff;
        }
        .lb-rank { font-weight: bold; color: #00ffcc; width: 30px; text-align: left; }
        .lb-name { flex-grow: 1; text-align: left; padding-left: 10px; }
        .lb-time { font-weight: bold; color: #ffd700; font-family: monospace; }
        .lb-highlight { background: rgba(0, 255, 204, 0.3); border-radius: 5px; }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #00ffcc;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .fade-out { opacity: 0; pointer-events: none; }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            #video-container { width: 100px; height: 75px; bottom: 10px; right: 10px; border-width: 2px; }
            #status-message { bottom: 95px; right: 10px; width: 140px; }
            .message-bubble { font-size: 0.8rem; padding: 5px 10px; }
            #left-panel { top: 10px; left: 10px; padding: 10px; transform: scale(0.9); transform-origin: top left; }
            h1 { font-size: 1.2rem; padding: 5px 15px; }
            #title-container { top: 70px; }
            #countdown-overlay { font-size: 5rem !important; }
            .step-dot { width: 20px; height: 20px; font-size: 0.7rem; }
            #steps-container { gap: 5px; }
            #music-icon { width: 35px; height: 35px; font-size: 1.2rem; bottom: 10px; left: 10px; }
            #player-name-input { font-size: 1.1rem; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="countdown-overlay" class="hidden">3</div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay-screen">
        <h1 style="font-size: 3rem; margin-top: 0; margin-bottom: 10px;">KOSMIK SAYOHAT</h1>
        <p style="font-size: 1.1rem; color: #00ffcc; margin-bottom: 20px;">10 Bosqichli Sarguzasht</p>
        <p style="font-size: 1rem; color: #ddd; margin: 10px; line-height: 1.4; max-width: 400px;">
            Qo'lingizni kamera oldida harakatlantiring. Obyektlarni ushlash uchun "chimchilang" (👌).
        </p>
        <input type="text" id="player-name-input" placeholder="Ismingizni kiriting..." maxlength="12" autocomplete="off">
        <div id="loading-container">
            <div class="loader"></div>
            <div>Tizim yuklanmoqda...</div>
        </div>
        <button id="start-btn" class="btn hidden">BOSHLASH</button>
    </div>

    <!-- Game UI -->
    <div id="ui-layer" class="hidden">
        <div id="left-panel">
            <div id="timer-display">00:00</div>
            <div id="progress-wrapper">
                <div id="progress-label">BOSQICH PROGRESSI</div>
                <div id="progress-container">
                    <div id="progress-fill"></div>
                </div>
            </div>
            <div id="steps-container"></div>
        </div>

        <div id="title-container">
            <h1 id="task-title">BOSQICH 1</h1>
        </div>

        <div id="status-message">
            <div id="hint-bubble" class="message-bubble">✊ USHLANG!</div>
        </div>
        
        <div id="music-icon" title="Ovozni o'chirish/yoqish">🔊</div>
    </div>
    
    <!-- Win Screen -->
    <div id="win-screen" class="overlay-screen hidden">
        <h1 style="font-size: 2.5rem; color: #FFD700; margin-top:0;">G'ALABA! 🎉</h1>
        <div id="leaderboard" style="display:none;">
            <h2>🏆 TOP REYTING</h2>
            <div id="lb-content"></div>
        </div>
        <p id="next-level-msg" style="font-size: 1.3rem; margin-top: 20px; display: none; color: #00ffcc;">Keyingi bosqichga tayyormisiz?</p>
        <button id="restart-btn" class="btn" style="display:none;">QAYTA O'YNASH 🔄</button>
    </div>

    <div id="video-container">
        <video id="input-video" playsinline webkit-playsinline muted autoplay></video>
        <canvas id="output-canvas"></canvas>
    </div>
    
    <div id="canvas-container"></div>

<script>
    // --- AUDIO SYSTEM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMusicPlaying = false;
    let nextNoteTime = 0;
    let noteIndex = 0;
    const melody = [523.25, 659.25, 783.99, 1046.50, 523.25, 587.33, 783.99, 880.00]; // C Major arpeggio

    // --- GAME STATE ---
    let hands; 
    let isHandProcessing = false; 
    let playerName = "O'yinchi"; 
    let totalPlayedTime = 0; 
    let lastFrameTime = 0;
    let isTimerRunning = false;
    let slowMoFactor = 1.0;

    // --- CONFIG & LEVELS (10 LEVELS) ---
    const CONFIG = {
        sensitivityX: 2.5,  // Smoothed sensitivity
        sensitivityY: 2.0,
        snapDistance: 1.8,
        pinchThreshold: 0.05 // Distance between thumb and index tips
    };

    const LEVELS = [
        { title: "1. MASHQ", items: [{ emoji: "⭐", name: "YULDUZ" }], color: 0x44aaff },
        { title: "2. MEVALAR", items: [{ emoji: "🍎", name: "OLMA" }, { emoji: "🍌", name: "BANAN" }], color: 0xffaa00 },
        { title: "3. OB-HAVO", items: [{ emoji: "☀️", name: "QUYOSH" }, { emoji: "☁️", name: "BULUT" }, { emoji: "🌧️", name: "YOMG'IR" }], color: 0x87CEEB },
        { title: "4. SPORT", items: [{ emoji: "⚽", name: "FUTBOL" }, { emoji: "🏀", name: "BASKETBOL" }, { emoji: "🎾", name: "TENNIS" }], color: 0xff5500 },
        { title: "5. SHAKLLAR", items: [{ emoji: "🟥", name: "KVADRAT" }, { emoji: "🔵", name: "DOIRA" }, { emoji: "🔺", name: "UCHBURCHAK" }], color: 0xff0055 },
        { title: "6. MAKTAB", items: [{ emoji: "📚", name: "KITOB" }, { emoji: "✏️", name: "QALAM" }, { emoji: "🎒", name: "SUMKA" }, { emoji: "💻", name: "KOMPYUTER" }], color: 0x228B22 },
        { title: "7. TRANSPORT", items: [{ emoji: "🚗", name: "MASHINA" }, { emoji: "✈️", name: "SAMOLYOT" }, { emoji: "🚀", name: "RAKETA" }, { emoji: "🚲", name: "VELOSIPED" }], color: 0x808080 },
        { title: "8. DENGIZ", items: [{ emoji: "🐟", name: "BALIQ" }, { emoji: "🐙", name: "OSMINOG" }, { emoji: "🦀", name: "QISQICHBAQA" }, { emoji: "🐳", name: "KIT" }], color: 0x00008B },
        { title: "9. KOSMOS", items: [{ emoji: "🌍", name: "YER" }, { emoji: "🌑", name: "OY" }, { emoji: "🪐", name: "SATURN" }, { emoji: "🛸", name: "UCHAR LAKOP" }, { emoji: "👽", name: "O'ZGA SAYYORALIK" }], color: 0x6a0dad },
        { title: "10. YAKUNIY", items: [{ emoji: "🦁", name: "SHER" }, { emoji: "💎", name: "OLMOS" }, { emoji: "🎁", name: "SOVG'A" }, { emoji: "👑", name: "TOJ" }, { emoji: "🏆", name: "KUBOK" }], color: 0xD4AF37 }
    ];

    const state = {
        levelIdx: 0,
        handPos: { x: 0, y: 0 },
        targetHandPos: { x: 0, y: 0 }, // For smoothing
        gesture: 'IDLE',
        handVisible: false,
        handLabel: 'Right',
        grabbedObj: null,
        hoveredObj: null,
        lockedCount: 0,
        totalPieces: 0,
        isTransitioning: false,
        worldSize: { width: 10, height: 10 }
    };

    const ui = {
        hintBubble: document.getElementById('hint-bubble'),
        startBtn: document.getElementById('start-btn'),
        nameInput: document.getElementById('player-name-input'),
        startScreen: document.getElementById('start-screen'),
        winScreen: document.getElementById('win-screen'),
        uiLayer: document.getElementById('ui-layer'),
        loading: document.getElementById('loading-container'),
        video: document.getElementById('input-video'),
        outCanvas: document.getElementById('output-canvas'),
        title: document.getElementById('task-title'),
        stepsContainer: document.getElementById('steps-container'),
        countdown: document.getElementById('countdown-overlay'),
        progressFill: document.getElementById('progress-fill'),
        restartBtn: document.getElementById('restart-btn'),
        timer: document.getElementById('timer-display'),
        lbContent: document.getElementById('lb-content'),
        leaderboard: document.getElementById('leaderboard'),
        nextMsg: document.getElementById('next-level-msg')
    };
    
    const canvasCtx = ui.outCanvas.getContext('2d');

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0b2e);
    scene.fog = new THREE.FogExp2(0x1a0b2e, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const piecesGroup = new THREE.Group();
    const slotsGroup = new THREE.Group();
    const particlesGroup = new THREE.Group();
    scene.add(piecesGroup);
    scene.add(slotsGroup);
    scene.add(particlesGroup);

    let cursorSprite;
    let texHandOpen, texHandPinch;

    // --- HELPERS ---
    function initCursor() {
        texHandOpen = createCursorTexture('✋', '#ffffff');
        texHandPinch = createCursorTexture('👌', '#00ffcc');
        const cursorMat = new THREE.SpriteMaterial({ map: texHandOpen, color: 0xffffff, transparent: true, depthTest: false });
        cursorSprite = new THREE.Sprite(cursorMat);
        cursorSprite.scale.set(1.5, 1.5, 1);
        cursorSprite.renderOrder = 999; 
        scene.add(cursorSprite);
    }

    function startTimer() {
        if (!isTimerRunning) {
            isTimerRunning = true;
            lastFrameTime = Date.now();
        }
    }

    function stopTimer() {
        isTimerRunning = false;
    }

    function updateTimerDisplay() {
        if (isTimerRunning) {
            const now = Date.now();
            const delta = now - lastFrameTime;
            lastFrameTime = now;
            totalPlayedTime += delta; 
            ui.timer.innerText = formatTime(totalPlayedTime);
        }
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // --- AUDIO FUNCTIONS ---
    function playNote(freq, time) {
        if (!isMusicPlaying || audioCtx.state !== 'running') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.05, time + 0.05); 
        gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5); 
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 1.5);
    }

    function scheduleMusic() {
        if (!isMusicPlaying) return;
        const tempo = 0.4; 
        const currentTime = audioCtx.currentTime;
        while (nextNoteTime < currentTime + 0.1) {
            const freq = melody[noteIndex];
            playNote(freq, nextNoteTime);
            if(Math.random() > 0.8) playNote(freq * 1.5, nextNoteTime); 
            nextNoteTime += tempo;
            noteIndex = (noteIndex + 1) % melody.length;
        }
        requestAnimationFrame(scheduleMusic);
    }

    function toggleMusic() {
        isMusicPlaying = !isMusicPlaying;
        if (isMusicPlaying) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleMusic();
        }
        updateMusicIcon();
    }

    function updateMusicIcon() {
        const icon = document.getElementById('music-icon');
        if (isMusicPlaying) {
            icon.innerText = '🔊'; icon.style.opacity = '1'; icon.style.borderColor = '#00ffcc';
        } else {
            icon.innerText = '🔇'; icon.style.opacity = '0.6'; icon.style.borderColor = 'rgba(255,255,255,0.2)';
        }
    }
    
    document.getElementById('music-icon').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation(); toggleMusic();
    });

    function playSound(type) {
        if (audioCtx.state !== 'running') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'select') { 
            osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'pop') { 
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'count') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now);
            gain.gain.setValueAtTime(0.03, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'win') {
            [440, 554, 659, 880].forEach((f, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = f;
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(0.1, now + 0.1 + i*0.1);
                g.gain.exponentialRampToValueAtTime(0.001, now + 2);
                o.start(now); o.stop(now + 2);
            });
        }
    }

    // --- TEXTURE GENERATION ---
    function createCursorTexture(emoji, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = '100px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 15;
        ctx.fillText(emoji, 64, 70);
        return new THREE.CanvasTexture(canvas);
    }

    function createSlotTexture(text, name, colorHex) {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 600; 
        const ctx = canvas.getContext('2d');
        
        const centerX = 256; const centerY = 256; const radius = 200;
        const hex = '#' + new THREE.Color(colorHex).getHexString();
        
        ctx.beginPath(); 
        ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fill();
        ctx.strokeStyle = hex; ctx.lineWidth = 15;
        ctx.shadowColor = hex; ctx.shadowBlur = 30; 
        ctx.setLineDash([30, 20]); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur = 0;

        ctx.font = 'bold 200px "Segoe UI Emoji", Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.globalAlpha = 0.4; ctx.fillText(text, centerX, centerY + 20); ctx.globalAlpha = 1.0;
        
        ctx.font = 'bold 60px "Fredoka One", sans-serif';
        ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 6;
        ctx.strokeText(name, centerX, 550); ctx.fillText(name, centerX, 550);
        
        return new THREE.CanvasTexture(canvas);
    }

    function createPieceTexture(text, colorHex) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const centerX = 128; const centerY = 128; const radius = 115;
        const hex = '#' + new THREE.Color(colorHex).getHexString();
        const grad = ctx.createRadialGradient(centerX,centerY,10, centerX,centerY,radius);
        grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, hex); grad.addColorStop(1, '#000000');
        
        ctx.beginPath(); 
        ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 8; ctx.stroke();
        
        ctx.font = 'bold 130px "Segoe UI Emoji", Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff'; ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=10;
        ctx.fillText(text, centerX, centerY + 10);
        
        return new THREE.CanvasTexture(canvas);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function updateLayout() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        const isPortrait = window.innerHeight > window.innerWidth;
        // Adjust camera Z to keep the play area visible on portrait
        if (isPortrait) { 
            camera.position.z = 20 + (state.levelIdx * 0.5); 
        } else { 
            camera.position.z = 14; 
        }
        
        const vFOV = THREE.Math.degToRad(camera.fov);
        const height = 2 * Math.tan(vFOV / 2) * camera.position.z;
        const width = height * camera.aspect;
        state.worldSize = { width, height };
    }

    function initLevel(idx) {
        state.isTransitioning = true;
        slowMoFactor = 1.0; 
        
        // Cleanup old objects
        [piecesGroup, slotsGroup].forEach(group => {
            while(group.children.length > 0) { 
                const obj = group.children[0];
                group.remove(obj);
                if(obj.geometry) obj.geometry.dispose();
                if(obj.material) { if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose()); else obj.material.dispose(); }
            }
        });
        
        state.levelIdx = idx;
        state.lockedCount = 0;
        const lvl = LEVELS[idx];
        
        ui.title.innerText = lvl.title;
        updateStepsUI();
        updateProgress(0); 

        const targetColor = new THREE.Color(lvl.color).lerp(new THREE.Color(0x000000), 0.7);
        scene.background = targetColor;
        scene.fog.color = targetColor;

        // Dynamic positioning logic
        const count = lvl.items.length;
        const angleStep = (Math.PI * 2) / count;
        const isPortrait = window.innerHeight > window.innerWidth;
        const radius = isPortrait ? 3.5 : 4.5; // Tighter circle on portrait

        let positions = [];
        for(let i=0; i<count; i++) {
             let angle = i * angleStep - (Math.PI/2); // Start from top
             // Add jitter
             angle += (Math.random() - 0.5) * 0.5;
             const r = radius + (Math.random() - 0.5) * 0.5;
             positions.push(new THREE.Vector3(Math.cos(angle)*r, Math.sin(angle)*r, 0));
        }
        shuffleArray(positions); 

        const scale = 1.0 - (count * 0.03); // Slightly smaller items if many

        lvl.items.forEach((item, i) => {
            const targetPos = positions[i];

            // SLOT
            const slotGeo = new THREE.PlaneGeometry(3.0, 3.5); 
            const slotTex = createSlotTexture(item.emoji, item.name, lvl.color);
            const slotMat = new THREE.MeshBasicMaterial({ map: slotTex, transparent: true, opacity: 0.8 });
            const slot = new THREE.Mesh(slotGeo, slotMat);
            slot.scale.setScalar(scale);
            slot.position.copy(targetPos);
            slot.position.y -= 0.3 * scale; 
            slot.position.z = -1; 
            slot.userData = { isSlot: true }; 
            slotsGroup.add(slot);

            // PIECE
            const pieceGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.2, 32);
            const pieceMatBody = new THREE.MeshStandardMaterial({ color: lvl.color, roughness: 0.3, metalness: 0.1 });
            const piece = new THREE.Mesh(pieceGeo, pieceMatBody);
            
            const faceGeo = new THREE.PlaneGeometry(2.0, 2.0);
            const faceTex = createPieceTexture(item.emoji, lvl.color);
            const faceMat = new THREE.MeshBasicMaterial({ map: faceTex, transparent: true });
            
            const frontFace = new THREE.Mesh(faceGeo, faceMat);
            frontFace.position.y = 0.11; frontFace.rotation.x = -Math.PI / 2; piece.add(frontFace);
            const backFace = new THREE.Mesh(faceGeo, faceMat);
            backFace.position.y = -0.11; backFace.rotation.x = Math.PI / 2; piece.add(backFace);
            
            piece.scale.setScalar(scale);
            piece.rotation.x = Math.PI / 2;
            
            // Random start pos within bounds
            const boundX = state.worldSize.width * 0.3;
            const boundY = state.worldSize.height * 0.3;
            piece.position.set(
                (Math.random()-0.5) * boundX, 
                (Math.random()-0.5) * boundY, 
                0.5 + (i * 0.1)
            );
            
            const velocity = new THREE.Vector3((Math.random()-0.5)*0.04, (Math.random()-0.5)*0.04, 0);

            piece.userData = { 
                id: i, targetPos: targetPos, isLocked: false, 
                baseZ: piece.position.z, velocity: velocity, name: item.name 
            };
            piecesGroup.add(piece);
        });
        
        state.totalPieces = piecesGroup.children.length;
        state.isTransitioning = false;
    }

    function createConfetti() {
        const count = 50; 
        const geo = new THREE.BufferGeometry(); 
        const posArr = new Float32Array(count*3); 
        const velArr = [];
        for(let i=0; i<count; i++) {
            posArr[i*3] = (Math.random()-0.5)*2; posArr[i*3+1] = (Math.random()-0.5)*2; posArr[i*3+2] = 0;
            velArr.push({x: (Math.random()-0.5)*0.5, y: (Math.random()-0.5)*0.5+0.2, z: (Math.random()-0.5)*0.5});
        }
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true });
        const sys = new THREE.Points(geo, mat); 
        sys.userData = { vels: velArr, life: 60 }; 
        particlesGroup.add(sys);
    }

    function updateParticles() {
        for(let i=particlesGroup.children.length-1; i>=0; i--) {
            const p = particlesGroup.children[i]; p.userData.life--;
            const pos = p.geometry.attributes.position.array;
            for(let j=0; j<p.userData.vels.length; j++) {
                pos[j*3] += p.userData.vels[j].x; pos[j*3+1] += p.userData.vels[j].y; pos[j*3+2] += p.userData.vels[j].z; 
                p.userData.vels[j].y -= 0.01; // Gravity
            }
            p.geometry.attributes.position.needsUpdate = true; 
            p.material.opacity = p.userData.life/60;
            if(p.userData.life<=0) particlesGroup.remove(p);
        }
    }

    function updateStepsUI() {
        ui.stepsContainer.innerHTML = '';
        LEVELS.forEach((lvl, idx) => {
            const dot = document.createElement('div'); dot.className = 'step-dot'; dot.innerText = idx + 1;
            if (idx < state.levelIdx) { dot.classList.add('completed'); dot.innerText = '✓'; } 
            else if (idx === state.levelIdx) { dot.classList.add('active'); }
            ui.stepsContainer.appendChild(dot);
        });
    }

    function updateProgress(percent) { ui.progressFill.style.width = percent + '%'; }

    function saveTime(name, timeMs) {
        let scores = JSON.parse(localStorage.getItem('kosmik_times_v2') || '[]');
        scores.push({ name: name, time: timeMs, date: new Date().toLocaleTimeString() });
        scores.sort((a, b) => a.time - b.time);
        scores = scores.slice(0, 5); 
        localStorage.setItem('kosmik_times_v2', JSON.stringify(scores));
    }

    function showLeaderboard() {
        stopTimer();
        saveTime(playerName, totalPlayedTime);
        const scores = JSON.parse(localStorage.getItem('kosmik_times_v2') || '[]');
        
        let html = '';
        scores.forEach((p, i) => {
            const cls = (p.name === playerName && p.time === totalPlayedTime) ? 'lb-row lb-highlight' : 'lb-row';
            const icon = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
            html += `
                <div class="${cls}">
                    <div class="lb-rank">${i+1} ${icon}</div>
                    <div class="lb-name">${p.name}</div>
                    <div class="lb-time">${formatTime(p.time)}</div>
                </div>`;
        });
        ui.lbContent.innerHTML = html;
        ui.winScreen.classList.remove('hidden');
    }

    // --- MEDIAPIPE HANDLER ---
    function onResults(results) {
        ui.outCanvas.width = ui.video.videoWidth;
        ui.outCanvas.height = ui.video.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, ui.outCanvas.width, ui.outCanvas.height);
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            // Only draw landmarks, no connectors for cleaner look
            drawLandmarks(canvasCtx, lm, {color: '#00FFCC', lineWidth: 1, radius: 3});

            state.handVisible = true;
            // Map 0..1 to -1..1
            const rawX = (1 - lm[9].x) * 2 - 1; 
            const rawY = (1 - lm[9].y) * 2 - 1;
            
            // Smoothed Target
            state.targetHandPos.x = rawX * CONFIG.sensitivityX;
            state.targetHandPos.y = rawY * CONFIG.sensitivityY;

            // Pinch Detection
            const thumb = lm[4];
            const index = lm[8];
            const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            
            if (dist < CONFIG.pinchThreshold) state.gesture = 'PINCH';
            else state.gesture = 'IDLE';
        } else {
            state.handVisible = false;
        }
        canvasCtx.restore();
        isHandProcessing = false; 
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function updateGame() {
        if(state.isTransitioning) return;
        updateParticles();
        updateTimerDisplay();

        // Animate background slots
        slotsGroup.children.forEach(slot => {
            slot.rotation.z = Math.sin(Date.now() * 0.001) * 0.05; 
        });

        // Animate floating pieces
        piecesGroup.children.forEach(obj => {
            if(!obj.userData.isLocked && obj !== state.grabbedObj) {
                // Movement logic based on level difficulty
                if (state.levelIdx > 2) {
                    const vel = obj.userData.velocity;
                    obj.position.x += vel.x * slowMoFactor;
                    obj.position.y += vel.y * slowMoFactor;

                    // Bounds checking
                    const limitX = state.worldSize.width / 2.2;
                    const limitY = state.worldSize.height / 2.2;
                    if (obj.position.x > limitX || obj.position.x < -limitX) vel.x *= -1;
                    if (obj.position.y > limitY || obj.position.y < -limitY) vel.y *= -1;
                }
                
                // Floating effect
                obj.position.y += Math.sin(Date.now() * 0.003 + obj.id) * 0.002;
                obj.rotation.z += 0.005 * slowMoFactor; 
                obj.rotation.x = Math.PI/2 + Math.sin(Date.now() * 0.002) * 0.1;
                obj.position.z = obj.userData.baseZ; 
            } else if (obj.userData.isLocked) {
                // Celebration wiggle
                obj.rotation.z = Math.sin(Date.now() * 0.005) * 0.1; 
            }
        });

        // Hand Smoothing
        if (state.handVisible) {
            state.handPos.x += (state.targetHandPos.x - state.handPos.x) * 0.2; // Lerp factor
            state.handPos.y += (state.targetHandPos.y - state.handPos.y) * 0.2;
            
            if(cursorSprite) {
                // Raycast to find World Position at Z=0 plane
                mouse.x = Math.max(-1, Math.min(1, state.handPos.x / (camera.aspect * 0.8))); // Normalize roughly
                mouse.y = Math.max(-1, Math.min(1, state.handPos.y / 0.8));

                // Manual unproject for better control over depth
                const vec = new THREE.Vector3(state.handPos.x, state.handPos.y, 0.5);
                vec.unproject(camera);
                const dir = vec.sub(camera.position).normalize();
                const distance = -camera.position.z / dir.z;
                const pos = camera.position.clone().add(dir.multiplyScalar(distance));

                cursorSprite.position.copy(pos);
                cursorSprite.position.z = 5; 
                cursorSprite.visible = true;
                
                if (state.gesture === 'PINCH') {
                    cursorSprite.material.map = texHandPinch;
                    cursorSprite.scale.set(1.3, 1.3, 1);
                } else {
                    cursorSprite.material.map = texHandOpen;
                    cursorSprite.scale.set(1.5, 1.5, 1);
                }
            }

            // --- INTERACTION LOGIC ---
            // Raycast for intersections
            raycaster.setFromCamera(new THREE.Vector2(state.handPos.x/camera.aspect * 0.5, state.handPos.y * 0.5), camera); // Approximate mapping
            // Actually simpler: just use distance to objects in 3D since movement is mapped 1:1 visually
            
            const cursorWorldPos = cursorSprite.position;

            if (state.gesture === 'PINCH') {
                if (!state.grabbedObj) {
                    // Try to grab
                    let closest = null;
                    let minD = 2.0;
                    piecesGroup.children.forEach(p => {
                        if(!p.userData.isLocked) {
                            const d = p.position.distanceTo(cursorWorldPos);
                            if(d < minD) { minD = d; closest = p; }
                        }
                    });

                    if (closest) {
                        state.grabbedObj = closest;
                        playSound('select');
                        showMessage("USHLANDI!", "#00ffcc");
                    }
                }
            } else {
                // Release
                if (state.grabbedObj) {
                    const obj = state.grabbedObj;
                    const target = obj.userData.targetPos;
                    // Check distance to slot
                    const distToSlot = new THREE.Vector2(obj.position.x, obj.position.y).distanceTo(new THREE.Vector2(target.x, target.y));

                    if (distToSlot < CONFIG.snapDistance) {
                        // SUCCESS LOCK
                        obj.position.copy(target);
                        obj.position.z = 0.2; 
                        obj.userData.isLocked = true;
                        obj.scale.setScalar(1.0);
                        
                        playSound('pop');
                        createConfetti();
                        state.lockedCount++;
                        updateProgress((state.lockedCount / state.totalPieces) * 100);
                        
                        // LEVEL COMPLETE CHECK
                        if (state.lockedCount === state.totalPieces) {
                            slowMoFactor = 0.1;
                            setTimeout(() => {
                                slowMoFactor = 1.0;
                                playSound('win');
                                state.isTransitioning = true;
                                stopTimer(); 
                                
                                if(state.levelIdx < LEVELS.length - 1) {
                                     ui.winScreen.classList.remove('hidden');
                                     ui.winScreen.querySelector('h1').innerText = "G'ALABA!";
                                     ui.leaderboard.style.display = 'none';
                                     ui.nextMsg.style.display = 'block';
                                     ui.restartBtn.style.display = 'none';
                                     
                                     setTimeout(() => {
                                        ui.winScreen.classList.add('hidden');
                                        startCountdown(true); 
                                     }, 3000);
                                } else {
                                    // FINAL WIN
                                    showLeaderboard();
                                    ui.winScreen.querySelector('h1').innerText = "O'YIN TUGADI!";
                                    ui.leaderboard.style.display = 'block';
                                    ui.nextMsg.style.display = 'none';
                                    ui.restartBtn.style.display = 'block';
                                }
                            }, 1000);
                        }
                    }
                    state.grabbedObj = null;
                    hideMessage();
                }
            }

            // Move grabbed object
            if (state.grabbedObj) {
                state.grabbedObj.position.lerp(cursorWorldPos, 0.2); // Drag lag
                state.grabbedObj.position.z = 2; // Lift up
                state.grabbedObj.scale.setScalar(1.2);
                state.grabbedObj.rotation.x = Math.lerp(state.grabbedObj.rotation.x, 0, 0.1); // Face camera
            }
        } else {
            if(cursorSprite) cursorSprite.visible = false;
        }
    }
    
    // Math helper
    Math.lerp = (start, end, amt) => (1 - amt) * start + amt * end;

    function showMessage(text, color) {
        ui.hintBubble.innerText = text;
        ui.hintBubble.style.color = color;
        ui.hintBubble.style.borderColor = color;
        ui.hintBubble.classList.add('visible');
    }

    function hideMessage() {
        ui.hintBubble.classList.remove('visible');
    }
    
    function startCountdown(isNextLevel = false) {
        let count = 3;
        ui.countdown.classList.remove('hidden');
        ui.countdown.style.opacity = 1;
        ui.countdown.innerText = count;
        playSound('count');

        const interval = setInterval(() => {
            count--;
            if(count > 0) {
                ui.countdown.innerText = count;
                playSound('count');
            } else {
                clearInterval(interval);
                ui.countdown.innerText = "KETDIK!";
                setTimeout(() => {
                    ui.countdown.classList.add('hidden');
                    if (isNextLevel) {
                        state.levelIdx++;
                        if(state.levelIdx >= LEVELS.length) state.levelIdx = 0;
                        initLevel(state.levelIdx);
                    }
                    startTimer(); 
                }, 800);
            }
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!ui.video.paused && !isHandProcessing) {
            isHandProcessing = true;
            hands.send({image: ui.video});
        }
        updateGame();
        renderer.render(scene, camera);
    }

    // --- INITIALIZATION ---
    window.addEventListener('load', () => {
        if (typeof Hands === 'undefined') {
            ui.loading.innerHTML = "Internet yo'q yoki kutubxona yuklanmadi.";
            return;
        }

        hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        ui.loading.style.display = 'none';
        ui.startBtn.classList.remove('hidden');
        
        initCursor();
        updateLayout(); 
    });

    ui.startBtn.addEventListener('click', async () => {
        const name = ui.nameInput.value.trim();
        if (!name) {
            ui.nameInput.style.borderColor = 'red';
            ui.nameInput.placeholder = "Ism kiritish shart!";
            return;
        }
        playerName = name;
        ui.nameInput.style.display = 'none'; 
        ui.startBtn.innerText = "Kamera yoqilmoqda...";

        try {
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            toggleMusic(); // Start background music
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
            ui.video.srcObject = stream;
            ui.video.onloadeddata = () => {
                ui.startScreen.classList.add('fade-out');
                setTimeout(() => {
                    ui.startScreen.classList.add('hidden');
                    initLevel(0); 
                    startCountdown(false); 
                }, 500);
                ui.uiLayer.classList.remove('hidden');
                updateLayout();
                animate();
            };
        } catch(e) {
            alert("Kamera xatosi: " + e.message);
            ui.startBtn.innerText = "Qayta urinish";
            ui.nameInput.style.display = 'block';
        }
    });
    
    ui.restartBtn.addEventListener('click', () => {
        ui.winScreen.classList.add('hidden');
        state.levelIdx = 0;
        stopTimer();
        totalPlayedTime = 0;
        ui.timer.innerText = "00:00";
        
        initLevel(0);
        startCountdown(false); 
    });

    window.addEventListener('resize', updateLayout);

</script>
