<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sehrli Pufaklar: O'rgatish Bosqichi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Nunito', sans-serif; }
        
        /* Fon uchun gradient (Osmon) */
        #bg-gradient {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            z-index: -1;
        }

        #canvas-container { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Maskot (Yordamchi Robot) */
        #mascot-container {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            display: flex; align-items: flex-end; gap: 15px;
            pointer-events: none;
        }
        #mascot-avatar {
            font-size: 80px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            animation: bounce 2s infinite ease-in-out;
        }
        #mascot-bubble {
            background: white; color: #333; padding: 20px; border-radius: 20px 20px 20px 0;
            font-size: 1.2rem; font-weight: bold; max-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0; transform: translateY(20px); transition: all 0.5s;
        }
        #mascot-bubble.visible { opacity: 1; transform: translateY(0); }

        /* Kamera oynasi */
        #video-container {
            position: absolute; top: 20px; right: 20px; 
            width: 160px; height: 120px;
            border-radius: 15px; border: 4px solid white; z-index: 100; 
            background: #000; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: scaleX(-1); /* Oyna effekti */
        }
        #input-video { width: 100%; height: 100%; object-fit: cover; }

        /* Start tugmasi */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .btn {
            background: #ffcc00; border: none; padding: 15px 40px;
            font-family: 'Fredoka One', cursive; font-size: 2rem; color: #d35400;
            border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #e67e22;
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #e67e22; }

        /* Hisoblagich */
        #score-board {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.3); padding: 10px 30px; border-radius: 30px;
            font-family: 'Fredoka One', cursive; font-size: 2rem; color: white;
            z-index: 10; backdrop-filter: blur(5px); border: 2px solid white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="bg-gradient"></div>

    <div id="overlay">
        <h1 style="color:white; font-family:'Fredoka One'; font-size: 3rem; margin-bottom: 20px;">SEHRLI PUFAKLAR 🫧</h1>
        <button id="start-btn" class="btn">BOSHLASH</button>
        <p style="color:white; margin-top: 15px;">Kamera ruxsatini bering!</p>
    </div>

    <div id="score-board">Yorilgan: <span id="score">0</span></div>

    <div id="mascot-container">
        <div id="mascot-avatar">🤖</div>
        <div id="mascot-bubble" class="visible">Salom! Men Turonboyman. Bugun pufaklarni yoramiz!</div>
    </div>

    <div id="video-container">
        <video id="input-video" playsinline muted autoplay></video>
    </div>
    
    <div id="canvas-container"></div>

<script>
    // --- OVOZ TIZIMI (Synth) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playPopSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // Pufak ovozi (tez pasayuvchi sinus to'lqin)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playSuccessSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    // --- O'YIN SOZLAMALARI ---
    const state = {
        score: 0,
        handPos: { x: 0, y: 0 },
        isPinching: false,
        bubbles: [],
        particles: []
    };

    const mascotTexts = [
        "Qo'lingizni kameraga ko'rsating! ✋",
        "Zo'r! Endi ko'rsatkich va bosh barmog'ingizni birlashtiring 👌",
        "Ana shunday! Endi pufaklarni ushlab ko'ring!",
        "Juda yaxshi ketyapsiz! Davom eting! 🚀"
    ];

    // --- THREE.JS SAHNASI ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Yorug'lik
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Qo'l kursorini yaratish
    const cursorGeo = new THREE.RingGeometry(0.3, 0.4, 32);
    const cursorMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, side: THREE.DoubleSide });
    const cursor = new THREE.Mesh(cursorGeo, cursorMat);
    cursor.visible = false;
    scene.add(cursor);

    // Pufak materiali (Shaffof va yaltiroq)
    const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);
    const bubbleMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0.1,
        roughness: 0,
        transmission: 0.9, // Shaffoflik (Glass effect)
        thickness: 1.5,
        envMapIntensity: 1,
        clearcoat: 1,
        clearcoatRoughness: 0.1
    });

    function createBubble() {
        const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
        // Tasodifiy joylashuv
        const x = (Math.random() - 0.5) * 15;
        const y = -10; // Pastdan chiqadi
        const z = (Math.random() - 0.5) * 5;
        
        bubble.position.set(x, y, z);
        bubble.scale.setScalar(Math.random() * 0.5 + 0.8);
        
        // Har bir pufakning o'z tezligi bor
        bubble.userData = { 
            velocity: Math.random() * 0.05 + 0.02,
            wobble: Math.random() * Math.PI 
        };
        
        scene.add(bubble);
        state.bubbles.push(bubble);
    }

    function createParticles(pos) {
        const geometry = new THREE.BufferGeometry();
        const count = 30;
        const positions = new Float32Array(count * 3);
        const velocities = [];

        for(let i=0; i<count; i++) {
            positions[i*3] = pos.x;
            positions[i*3+1] = pos.y;
            positions[i*3+2] = pos.z;
            velocities.push({
                x: (Math.random() - 0.5) * 0.5,
                y: (Math.random() - 0.5) * 0.5,
                z: (Math.random() - 0.5) * 0.5
            });
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true });
        const particles = new THREE.Points(geometry, material);
        particles.userData = { velocities: velocities, life: 60 };
        scene.add(particles);
        state.particles.push(particles);
    }

    // --- MEDIAPIPE (Qo'l aniqlash) ---
    const videoElement = document.getElementById('input-video');
    
    function onResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            // Koordinatalarni olish (Barmoq uchlari)
            const indexTip = landmarks[8];
            const thumbTip = landmarks[4];

            // 3D olamga o'tkazish (Taxminiy proyeksiyalash)
            const x = (1 - indexTip.x) * 2 - 1; // Mirror effect uchun 1-x
            const y = (1 - indexTip.y) * 2 - 1;
            
            // Kursor harakati (Smooth)
            const vector = new THREE.Vector3(x * 10, y * 6, 0); 
            state.handPos.x += (vector.x - state.handPos.x) * 0.3;
            state.handPos.y += (vector.y - state.handPos.y) * 0.3;
            
            cursor.position.set(state.handPos.x, state.handPos.y, 0);
            cursor.visible = true;

            // Pinch (Chimchilash) masofasini o'lchash
            const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
            const wasPinching = state.isPinching;
            state.isPinching = distance < 0.08; // Sezgirlik chegarasi

            // Rang o'zgarishi
            if (state.isPinching) {
                cursor.material.color.setHex(0x00ff00); // Yashil
                cursor.scale.setScalar(0.8);
            } else {
                cursor.material.color.setHex(0xffcc00); // Sariq
                cursor.scale.setScalar(1);
            }
            
            // Maskot gapi
            if(state.score === 0 && !state.isPinching) updateMascot(1); 
            if(state.score === 0 && state.isPinching) updateMascot(2);

        } else {
            cursor.visible = false;
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    // --- GAME LOOP ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function update() {
        // 1. Pufaklar harakati
        if (Math.random() < 0.02) createBubble(); // Yangi pufak

        for (let i = state.bubbles.length - 1; i >= 0; i--) {
            const b = state.bubbles[i];
            b.position.y += b.userData.velocity;
            b.position.x += Math.sin(Date.now() * 0.002 + b.userData.wobble) * 0.02;

            // Ekrandan chiqib ketsa o'chirish
            if (b.position.y > 8) {
                scene.remove(b);
                state.bubbles.splice(i, 1);
            }
        }

        // 2. Partikullar harakati
        for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            const positions = p.geometry.attributes.position.array;
            p.userData.life--;
            
            for(let j=0; j<p.userData.velocities.length; j++) {
                positions[j*3] += p.userData.velocities[j].x;
                positions[j*3+1] += p.userData.velocities[j].y;
                positions[j*3+2] += p.userData.velocities[j].z;
            }
            p.geometry.attributes.position.needsUpdate = true;
            p.material.opacity = p.userData.life / 60;
            
            if(p.userData.life <= 0) {
                scene.remove(p);
                state.particles.splice(i, 1);
            }
        }

        // 3. To'qnashuvni tekshirish (Faqat Chimchilaganda)
        if (state.isPinching && cursor.visible) {
            // Raycaster kursordan oldinga qarab otiladi
            const origin = new THREE.Vector3(state.handPos.x, state.handPos.y, 10);
            const direction = new THREE.Vector3(0, 0, -1);
            raycaster.set(origin, direction);

            // Raycaster o'rniga oddiy masofa (Sphere Collision) tekshirsa ham bo'ladi, lekin bu aniqroq
            // Keling, oddiy masofa bilan ishlaymiz, tezroq ishlaydi
            for (let i = state.bubbles.length - 1; i >= 0; i--) {
                const b = state.bubbles[i];
                const dist = cursor.position.distanceTo(b.position);
                
                if (dist < 1.2) { // Agar qo'l pufakka tegsa
                    // POP!
                    playPopSound();
                    createParticles(b.position);
                    scene.remove(b);
                    state.bubbles.splice(i, 1);
                    state.score++;
                    document.getElementById('score').innerText = state.score;
                    
                    if(state.score === 1) updateMascot(3);
                }
            }
        }

        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    
    // --- KAMERA VA BOSHLASH ---
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    
    startBtn.addEventListener('click', async () => {
        startBtn.innerText = "Yuklanmoqda...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            videoElement.srcObject = stream;
            
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraUtils.start();
            
            overlay.classList.add('hidden');
            updateMascot(0);
            update(); // O'yinni boshlash

        } catch (e) {
            alert("Kamerani yoqib bo'lmadi. Ruxsat bering!");
            console.error(e);
        }
    });

    // Maskot matnini o'zgartirish
    function updateMascot(index) {
        const bubble = document.getElementById('mascot-bubble');
        bubble.classList.remove('visible');
        setTimeout(() => {
            bubble.innerText = mascotTexts[index];
            bubble.classList.add('visible');
        }, 500);
    }

    // Ekran o'lchami o'zgarganda
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
