<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matematik Poyezd - Interaktiv O'yin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .hidden-screen { display: none !important; }
        /* Mobil qurilmalarda ekranni surib yubormaslik uchun */
        #gameCanvas { 
            touch-action: none; 
            cursor: grab;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 font-sans min-h-screen flex flex-col overflow-hidden">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
        <div class="flex items-center space-x-3">
            <span class="text-3xl">🚂</span>
            <span class="text-2xl font-bold tracking-wider">Matematik Poyezd</span>
        </div>
        <div class="space-x-4 hidden md:block">
            <span class="hover:text-blue-200 cursor-pointer font-semibold border-b-2 border-white pb-1">O'yin</span>
            <span class="hover:text-blue-200 cursor-pointer">Reyting</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-5xl flex-grow flex flex-col justify-center">
        
        <!-- O'yin Konteyneri -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-200 relative w-full" style="aspect-ratio: 4/3; max-height: 75vh;">
            
            <!-- 1. Menyus Ekrani -->
            <div id="menuScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-blue-300 to-green-300 z-20">
                <div class="w-32 h-32 bg-white/30 backdrop-blur rounded-full flex items-center justify-center mb-6 shadow-xl animate-bounce">
                    <span class="text-7xl">🚂</span>
                </div>
                <h2 class="text-4xl font-extrabold text-blue-900 mb-4 text-center px-4 drop-shadow-md">Poyezdni jo'natamiz!</h2>
                <p class="text-blue-800 font-medium mb-8 max-w-md text-center px-6 text-lg">
                    Poyezd vagonidagi misolni yeching va pastdagi qutilardan to'g'ri javobni vagonga orting!
                </p>
                <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full shadow-[0_8px_0_rgb(30,58,138)] hover:shadow-[0_4px_0_rgb(30,58,138)] hover:translate-y-1 transform transition text-2xl">
                    Boshladik!
                </button>
            </div>

            <!-- 2. O'yin Tugashi Ekrani -->
            <div id="gameoverScreen" class="hidden-screen absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-yellow-300 to-orange-400 z-20">
                <span class="text-8xl mb-4">🏆</span>
                <h2 class="text-5xl font-extrabold text-white mb-2 drop-shadow-lg">Barakalla!</h2>
                <p class="text-3xl text-orange-900 mb-8 font-bold">To'plagan balingiz: <span id="finalScore" class="text-white">0</span></p>
                <button onclick="startGame()" class="bg-white text-orange-600 hover:bg-gray-100 font-bold py-4 px-12 rounded-full shadow-lg transform transition hover:scale-105 text-2xl">
                    Yana O'ynash
                </button>
            </div>

            <!-- 3. O'yin Ekrani -->
            <div id="playingScreen" class="hidden-screen absolute inset-0 bg-sky-200">
                
                <!-- Yuqori Panel (Ball va Daraja) -->
                <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-10 pointer-events-none">
                    <div class="bg-white/90 backdrop-blur rounded-2xl px-6 py-2 shadow-lg border-2 border-white flex items-center gap-3">
                        <span class="text-2xl">⭐</span>
                        <p class="text-2xl font-bold text-slate-800"><span id="currentScore" class="text-blue-600">0</span></p>
                    </div>
                    <button onclick="stopGame()" class="bg-red-500/90 hover:bg-red-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg pointer-events-auto transition">
                        Chiqish
                    </button>
                </div>

                <!-- Asosiy Canvas -->
                <canvas id="gameCanvas" class="w-full h-full block"></canvas>
            </div>
        </div>
    </main>

    <script>
        // --- MATEMATIKA BAZASI ---
        const MATH_LEVELS = [
            { q: "5 + 3 = ?", a: "8", options: ["6", "7", "8", "9"] },
            { q: "10 - 4 = ?", a: "6", options: ["4", "5", "6", "7"] },
            { q: "4 × 2 = ?", a: "8", options: ["6", "8", "10", "12"] },
            { q: "9 + 5 = ?", a: "14", options: ["12", "13", "14", "15"] },
            { q: "12 ÷ 3 = ?", a: "4", options: ["2", "3", "4", "5"] },
            { q: "15 - 7 = ?", a: "8", options: ["6", "7", "8", "9"] },
        ];
        const BOX_COLORS = ['#ef4444', '#f59e0b', '#10b981', '#a855f7'];

        // --- O'ZGARUVCHILAR ---
        let gameState = 'menu';
        let score = 0;
        let currentLevelIndex = 0;
        let animationId;
        
        let canvas, ctx;
        let width, height;

        // O'yin obyektlari
        let train = null;
        let boxes = [];
        let particles = [];
        let smokeParticles = [];
        
        // Drag & Drop holati
        let draggedBox = null;
        let offsetX = 0;
        let offsetY = 0;

        // --- EKRANLARNI BOSHQARISH ---
        const screens = {
            menu: document.getElementById('menuScreen'),
            playing: document.getElementById('playingScreen'),
            gameover: document.getElementById('gameoverScreen')
        };
        const scoreEls = { current: document.getElementById('currentScore'), final: document.getElementById('finalScore') };

        function setScreen(screenName) {
            gameState = screenName;
            Object.values(screens).forEach(s => s.classList.add('hidden-screen'));
            screens[screenName].classList.remove('hidden-screen');
        }

        function updateScore(points) {
            score += points;
            scoreEls.current.innerText = score;
            scoreEls.final.innerText = score;
        }

        // --- O'YIN OBYEKTLARI KLASSLARI ---

        class Train {
            constructor(equation, answer) {
                this.equation = equation;
                this.answer = answer;
                
                // O'lchamlar va joylashuv
                this.scale = height / 600; 
                this.w = 400 * this.scale;
                this.h = 160 * this.scale;
                
                this.x = -this.w; // Chap tomondan keladi
                this.y = height * 0.5 - this.h/2; // O'rtaroqda
                
                this.state = 'arriving'; // arriving, waiting, leaving
                this.speed = 8 * this.scale;
                
                // Vagonning ortish hududi (Drop zone)
                this.dropZone = { x: 0, y: 0, w: 120 * this.scale, h: 100 * this.scale };
                this.hasCargo = false;
                this.cargoText = "";
            }

            update() {
                if (this.state === 'arriving') {
                    this.x += this.speed;
                    if (this.x >= width / 2 - this.w / 2) {
                        this.x = width / 2 - this.w / 2;
                        this.state = 'waiting';
                    }
                    this.emitSmoke();
                } else if (this.state === 'leaving') {
                    this.x += this.speed;
                    this.emitSmoke();
                }

                // Drop zone koordinatalarini yangilash (vagonning o'rtasida)
                this.dropZone.x = this.x + 40 * this.scale;
                this.dropZone.y = this.y + 30 * this.scale;
            }

            emitSmoke() {
                if (Math.random() < 0.3) {
                    smokeParticles.push(new Smoke(this.x + this.w - 40 * this.scale, this.y - 20 * this.scale, this.scale));
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 1. Vagon (Chap qism)
                ctx.fillStyle = '#b91c1c'; // To'q qizil
                ctx.beginPath();
                ctx.roundRect(0, 20 * this.scale, 200 * this.scale, 120 * this.scale, 10);
                ctx.fill();
                ctx.strokeRect(0, 20 * this.scale, 200 * this.scale, 120 * this.scale);

                // Vagondagi misol matni
                ctx.fillStyle = 'white';
                ctx.font = `bold ${36 * this.scale}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Agar yuk ortilmagan bo'lsa misolni ko'rsatamiz, aks holda to'liq yechimni
                let displayText = this.hasCargo ? this.equation.replace('?', this.answer) : this.equation;
                ctx.fillText(displayText, 100 * this.scale, -20 * this.scale);

                // Drop zone (Bo'sh joy)
                if (!this.hasCargo) {
                    ctx.setLineDash([8, 8]);
                    ctx.lineWidth = 4 * this.scale;
                    ctx.strokeStyle = '#fca5a5';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.beginPath();
                    ctx.roundRect(40 * this.scale, 30 * this.scale, 120 * this.scale, 100 * this.scale, 8);
                    ctx.fill();
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else {
                    // Ortib qo'yilgan yukni chizish
                    ctx.fillStyle = '#10b981'; // Yashil quti
                    ctx.beginPath();
                    ctx.roundRect(40 * this.scale, 30 * this.scale, 120 * this.scale, 100 * this.scale, 8);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${48 * this.scale}px sans-serif`;
                    ctx.fillText(this.cargoText, 100 * this.scale, 80 * this.scale);
                }

                // 2. Lokomotiv (O'ng qism)
                ctx.fillStyle = '#1d4ed8'; // Ko'k
                ctx.beginPath();
                ctx.roundRect(210 * this.scale, 40 * this.scale, 170 * this.scale, 100 * this.scale, [0, 20, 0, 0]);
                ctx.fill();
                
                // Lokomotiv kabinasi
                ctx.fillStyle = '#1e3a8a';
                ctx.fillRect(210 * this.scale, -20 * this.scale, 80 * this.scale, 60 * this.scale);
                ctx.fillStyle = '#60a5fa'; // Oyna
                ctx.fillRect(230 * this.scale, -10 * this.scale, 40 * this.scale, 40 * this.scale);

                // Mo'ri (Chimney)
                ctx.fillStyle = '#475569';
                ctx.fillRect(340 * this.scale, 10 * this.scale, 20 * this.scale, 30 * this.scale);

                // Ulagich
                ctx.fillStyle = '#334155';
                ctx.fillRect(200 * this.scale, 110 * this.scale, 10 * this.scale, 10 * this.scale);

                // 3. G'ildiraklar
                ctx.fillStyle = '#1e293b';
                const drawWheel = (wx, wy, r) => {
                    ctx.beginPath(); ctx.arc(wx, wy, r, 0, Math.PI * 2); ctx.fill();
                    ctx.lineWidth = 4 * this.scale; ctx.strokeStyle = '#94a3b8'; ctx.stroke();
                    // G'ildirak aylanayotganini bildirish uchun oq nuqta
                    if(this.state !== 'waiting') {
                        let angle = (Date.now() / 150) % (Math.PI * 2);
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(wx + Math.cos(angle) * (r/2), wy + Math.sin(angle) * (r/2), r/5, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#1e293b';
                    }
                };
                
                drawWheel(50 * this.scale, 150 * this.scale, 25 * this.scale); // Vagon 1
                drawWheel(150 * this.scale, 150 * this.scale, 25 * this.scale); // Vagon 2
                drawWheel(250 * this.scale, 150 * this.scale, 25 * this.scale); // Loko 1
                drawWheel(330 * this.scale, 140 * this.scale, 35 * this.scale); // Loko katta g'ildirak

                ctx.restore();
            }
        }

        class Box {
            constructor(text, isCorrect, index, totalOptions) {
                this.text = text;
                this.isCorrect = isCorrect;
                
                this.scale = height / 600;
                this.w = 100 * this.scale;
                this.h = 100 * this.scale;
                
                // Qutilarni ekranning pastiga tekis taqsimlash
                const spacing = (width - (totalOptions * this.w)) / (totalOptions + 1);
                this.originalX = spacing + index * (this.w + spacing);
                this.originalY = height - this.h - (30 * this.scale);
                
                this.x = this.originalX;
                this.y = this.originalY;
                
                this.color = BOX_COLORS[index % BOX_COLORS.length];
                this.isDragging = false;
                this.shakeAmount = 0; // Noto'g'ri bo'lsa titrash effekti
            }

            draw(ctx) {
                ctx.save();
                
                let renderX = this.x;
                if (this.shakeAmount > 0) {
                    renderX += Math.sin(Date.now() / 30) * this.shakeAmount;
                    this.shakeAmount *= 0.9; // Titrashni pasaytirish
                }

                ctx.translate(renderX, this.y);

                // Quti foni va soyasi
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = this.isDragging ? 20 : 5;
                ctx.shadowOffsetY = this.isDragging ? 10 : 5;

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(0, 0, this.w, this.h, 12);
                ctx.fill();

                // Yog'och tekstura chiziqlari (oddiy dekor)
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 4 * this.scale;
                ctx.beginPath(); ctx.moveTo(10, 20); ctx.lineTo(this.w-10, 20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, this.h-20); ctx.lineTo(this.w-10, this.h-20); ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // Matn (Raqam)
                ctx.fillStyle = 'white';
                ctx.font = `bold ${48 * this.scale}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.w / 2, this.h / 2);

                ctx.restore();
            }

            isInside(px, py) {
                return px >= this.x && px <= this.x + this.w &&
                       py >= this.y && py <= this.y + this.h;
            }
        }

        class Smoke {
            constructor(x, y, scale) {
                this.x = x;
                this.y = y;
                this.r = 10 * scale;
                this.vx = -1 - Math.random();
                this.vy = -2 - Math.random() * 2;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.r += 0.5;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(200, 200, 200, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
            }
        }

        class Confetti {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15 - 5;
                this.color = BOX_COLORS[Math.floor(Math.random() * BOX_COLORS.length)];
                this.size = Math.random() * 8 + 4;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.vy += 0.5; // Gravitatsiya
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // --- ASOSIY MANTIQ VA DASTUR ---

        function initCanvas() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Canvas o'lchamlarini konteynerga moslash
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;
        }

        window.addEventListener('resize', () => {
            if(gameState === 'playing') {
                initCanvas();
                // O'lcham o'zgarsa obyektlarni ham moslash kerak bo'ladi, prototip uchun qayta chizamiz
            }
        });

        function startGame() {
            setScreen('playing');
            initCanvas();
            score = 0;
            currentLevelIndex = 0;
            updateScore(0);
            
            initLevel(currentLevelIndex);
            
            if(animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function stopGame() {
            cancelAnimationFrame(animationId);
            setScreen('menu');
        }

        function initLevel(index) {
            if (index >= MATH_LEVELS.length) {
                setScreen('gameover');
                return;
            }
            
            const level = MATH_LEVELS[index];
            train = new Train(level.q, level.a);
            
            const shuffled = [...level.options].sort(() => Math.random() - 0.5);
            boxes = shuffled.map((opt, i) => new Box(opt, opt === level.a, i, shuffled.length));
            
            particles = [];
            smokeParticles = [];
            draggedBox = null;
        }

        function gameLoop() {
            if (gameState !== 'playing') return;

            // Fonga manzara chizish
            drawBackground(ctx);

            // Zarrachalarni (Tutun) yangilash
            smokeParticles.forEach((p, i) => {
                p.update();
                p.draw(ctx);
                if (p.life <= 0) smokeParticles.splice(i, 1);
            });

            // Poyezdni yangilash va chizish
            if (train) {
                train.update();
                train.draw(ctx);
                
                // Agar poyezd ketib bo'lsa, keyingi bosqich
                if (train.state === 'leaving' && train.x > width + 100) {
                    currentLevelIndex++;
                    initLevel(currentLevelIndex);
                }
            }

            // Qutilarni chizish
            // Drag qilinayotgan quti eng ustda turishi uchun alohida chizamiz
            boxes.forEach(box => { if (!box.isDragging) box.draw(ctx); });
            if (draggedBox) draggedBox.draw(ctx);

            // Konfeti zarrachalari
            particles.forEach((p, i) => {
                p.update();
                p.draw(ctx);
                if (p.life <= 0) particles.splice(i, 1);
            });

            animationId = requestAnimationFrame(gameLoop);
        }

        function drawBackground(ctx) {
            // Osmon gradienti
            const bg = ctx.createLinearGradient(0, 0, 0, height);
            bg.addColorStop(0, '#7dd3fc'); // Yorqin havorang
            bg.addColorStop(1, '#bae6fd');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, width, height);

            // Quyosh
            ctx.fillStyle = '#fef08a';
            ctx.beginPath(); ctx.arc(width * 0.8, height * 0.2, height * 0.1, 0, Math.PI*2); ctx.fill();

            // Yashil tepaliklar (Orqa fon)
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.ellipse(width * 0.3, height, width * 0.6, height * 0.4, 0, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = '#22c55e';
            ctx.beginPath();
            ctx.ellipse(width * 0.8, height, width * 0.5, height * 0.35, 0, Math.PI, 0);
            ctx.fill();

            // Temir yo'l platformasi
            ctx.fillStyle = '#94a3b8'; // Kulrang tosh
            ctx.fillRect(0, train ? train.y + 160 * train.scale : height*0.7, width, height);
            
            // Relislar
            const railY = train ? train.y + 160 * train.scale : height*0.7;
            ctx.fillStyle = '#475569';
            ctx.fillRect(0, railY, width, 10);
            ctx.fillStyle = '#78350f'; // Yog'och shpallar
            for(let i=0; i<width; i+=40) {
                ctx.fillRect(i, railY, 15, 20);
            }
        }

        // --- HODISALAR (Sichqoncha va Touch) ---

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handlePointerDown(e) {
            if (gameState !== 'playing' || train.state !== 'waiting') return;
            const pos = getPointerPos(e);
            
            // Eng oxirgi (ustki) qutini tekshirish
            for (let i = boxes.length - 1; i >= 0; i--) {
                if (boxes[i].isInside(pos.x, pos.y)) {
                    draggedBox = boxes[i];
                    draggedBox.isDragging = true;
                    offsetX = pos.x - draggedBox.x;
                    offsetY = pos.y - draggedBox.y;
                    break;
                }
            }
        }

        function handlePointerMove(e) {
            if (!draggedBox) return;
            e.preventDefault(); // Scrollni to'xtatish
            const pos = getPointerPos(e);
            draggedBox.x = pos.x - offsetX;
            draggedBox.y = pos.y - offsetY;
        }

        function handlePointerUp(e) {
            if (!draggedBox) return;
            
            // Drop zonaga tushdimi tekshirish
            const boxCenterX = draggedBox.x + draggedBox.w / 2;
            const boxCenterY = draggedBox.y + draggedBox.h / 2;
            const dz = train.dropZone;

            const isInsideZone = boxCenterX > dz.x && boxCenterX < dz.x + dz.w &&
                                 boxCenterY > dz.y && boxCenterY < dz.y + dz.h;

            if (isInsideZone) {
                if (draggedBox.isCorrect) {
                    // TO'G'RI JAVOB
                    train.hasCargo = true;
                    train.cargoText = draggedBox.text;
                    train.state = 'leaving';
                    
                    // Konfeti effekti
                    for(let i=0; i<50; i++) particles.push(new Confetti(dz.x + dz.w/2, dz.y + dz.h/2));
                    
                    updateScore(10);
                    
                    // Qutini ro'yxatdan o'chirish (poyezdga mindi)
                    boxes = boxes.filter(b => b !== draggedBox);
                } else {
                    // XATO JAVOB
                    draggedBox.shakeAmount = 20; // Titrash
                    draggedBox.x = draggedBox.originalX;
                    draggedBox.y = draggedBox.originalY;
                    updateScore(-5);
                }
            } else {
                // Joyiga qaytarish
                draggedBox.x = draggedBox.originalX;
                draggedBox.y = draggedBox.originalY;
            }

            draggedBox.isDragging = false;
            draggedBox = null;
        }

        // Hodisalarni ulash
        initCanvas(); // Dastlabki bog'lash uchun
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        canvas.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

    </script>
</body>
</html>
