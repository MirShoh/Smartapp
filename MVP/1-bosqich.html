<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sehrli Pufaklar: Bolajonlar Uchun</title>
    
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(135deg, #87CEEB 0%, #E0F7FA 100%); /* Yorqin osmon */
            font-family: 'Nunito', sans-serif; 
            user-select: none; 
            touch-action: none; 
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
        }

        /* Video ramkasi - bolalar uchun yumshoqroq ko'rinishda */
        #video-container {
            position: absolute; bottom: 20px; right: 20px; 
            width: 180px; height: 135px;
            border-radius: 30px; border: 5px solid #fff; z-index: 100; 
            background: #87CEEB; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: scaleX(-1);
            pointer-events: none;
        }
        
        #input-video { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; 
        }
        #output-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 2;
        }

        /* O'yin statusi va yordamchi xabarlar */
        #status-message {
            position: absolute; bottom: 180px; right: 20px; 
            width: 200px; text-align: center; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .message-bubble {
            background: #fff; color: #333;
            padding: 12px 24px; border-radius: 25px;
            font-family: 'Fredoka One', cursive; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            opacity: 0; transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .message-bubble.visible { opacity: 1; transform: scale(1); }

        /* Hisoblagich (Score) */
        #score-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            pointer-events: auto;
            transition: transform 0.2s;
        }
        #score-container:active { transform: scale(0.95); }
        
        #score-icon { font-size: 2rem; }
        #score-text { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #FFD700; text-shadow: 1px 1px 0 #fff; }

        /* Katta sarlavha */
        #center-message {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Fredoka One', cursive; font-size: 4rem;
            color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0; pointer-events: none; text-align: center;
            transition: all 0.5s ease; width: 100%;
        }
        #center-message.show { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }

        /* Boshlash ekrani */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(135, 206, 235, 0.95); z-index: 50; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
            transition: opacity 0.5s; pointer-events: auto;
        }
        
        .btn {
            background: #fff; border: none; padding: 20px 60px;
            color: #87CEEB; font-size: 1.8rem; border-radius: 50px; cursor: pointer; margin-top: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            font-family: 'Fredoka One', cursive; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        
        #music-icon {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 2.5rem; cursor: pointer; color: #fff;
            background: rgba(255,255,255,0.3); padding: 15px; border-radius: 50%;
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; pointer-events: auto;
        }
        #music-icon:hover { transform: scale(1.1); }

        .loader {
            border: 5px solid #f3f3f3; border-top: 5px solid #87CEEB;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="start-screen" class="overlay-screen">
        <h1 style="font-size: 4rem; margin-top: 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.1);">SEHRLI PUFAKLAR</h1>
        <p style="font-size: 1.5rem; color: #fff; margin: 10px; max-width: 600px;">
            Hush kelibsiz!<br>
            Ekranda uchib yurgan pufakchalarni barmoqlaringiz bilan chimchilab (👌) yoring!
        </p>
        <div id="loading-container">
            <div class="loader"></div>
            <div>Yuklanmoqda...</div>
        </div>
        <button id="start-btn" class="btn hidden">BOSHLASH</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div id="score-container">
            <div id="score-icon">🌟</div>
            <div id="score-text">0</div>
        </div>

        <div id="center-message">AJOYIB!</div>

        <div id="status-message">
            <div id="hint-bubble" class="message-bubble">👌 CHIMCHILANG!</div>
        </div>
        
        <div id="music-icon">🎵</div>
    </div>
    
    <div id="video-container">
        <video id="input-video" playsinline webkit-playsinline muted autoplay></video>
        <canvas id="output-canvas"></canvas>
    </div>
    
    <div id="canvas-container"></div>

<script>
    // --- AUDIO TIZIMI ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMusicPlaying = false;
    let nextNoteTime = 0;
    let noteIndex = 0;
    
    // Yumshoq va yoqimli melodiya (Major Pentatonic)
    const melody = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 880.00, 783.99];

    function playNote(freq, time) {
        if (!isMusicPlaying) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.value = freq;
        // Juda yumshoq ovoz
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.05, time + 0.1); 
        gain.gain.exponentialRampToValueAtTime(0.001, time + 1.0); 
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 1.0);
    }

    function scheduleMusic() {
        if (!isMusicPlaying) return;
        const tempo = 0.5; 
        const currentTime = audioCtx.currentTime;
        while (nextNoteTime < currentTime + 0.1) {
            playNote(melody[noteIndex], nextNoteTime);
            nextNoteTime += tempo;
            noteIndex = (noteIndex + 1) % melody.length;
        }
        requestAnimationFrame(scheduleMusic);
    }

    function toggleMusic() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isMusicPlaying = !isMusicPlaying;
        const icon = document.getElementById('music-icon');
        if (isMusicPlaying) {
            icon.innerText = '🔊';
            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleMusic();
        } else {
            icon.innerText = '🔇';
        }
    }

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'pop') { 
            // "Plop" ovozi
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'wave') {
            // Yangi to'lqin ovozi (sehrli)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.linearRampToValueAtTime(880, now + 0.5);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.1, now + 0.2);
            gain.gain.linearRampToValueAtTime(0, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        }
    }

    document.getElementById('music-icon').addEventListener('click', toggleMusic);

    // --- O'YIN LOGIKASI ---
    const CONFIG = {
        sensitivityX: 3.0, 
        sensitivityY: 2.2,
        pinchThreshold: 0.08, // Osonroq qilish uchun
    };

    // Pufak ichidagi sovg'alar
    const REWARDS = ["⭐", "🍎", "🎈", "🦋", "🍄", "🐱", "🚀", "💎"];

    const state = {
        score: 0,
        handPos: { x: 0, y: 0 },
        gesture: 'IDLE',
        handVisible: false,
        worldSize: { width: 10, height: 10 },
        wave: 1
    };

    const ui = {
        startScreen: document.getElementById('start-screen'),
        uiLayer: document.getElementById('ui-layer'),
        loading: document.getElementById('loading-container'),
        startBtn: document.getElementById('start-btn'),
        video: document.getElementById('input-video'),
        outCanvas: document.getElementById('output-canvas'),
        scoreText: document.getElementById('score-text'),
        hintBubble: document.getElementById('hint-bubble'),
        centerMsg: document.getElementById('center-message')
    };
    
    const canvasCtx = ui.outCanvas.getContext('2d');

    // THREE.JS SETUP
    const scene = new THREE.Scene();
    scene.background = null; // Orqa fon CSS orqali (Gradient)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 12;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Yorug'lik
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Guruhlar
    const bubblesGroup = new THREE.Group();
    const itemsGroup = new THREE.Group(); // Pufak ichidagi narsalar
    const particlesGroup = new THREE.Group();
    scene.add(bubblesGroup);
    scene.add(itemsGroup);
    scene.add(particlesGroup);

    // Qo'l kursor
    let cursorSprite, texHandOpen, texHandPinch;
    function initCursor() {
        texHandOpen = createEmojiTexture('✋');
        texHandPinch = createEmojiTexture('👌');
        const cursorMat = new THREE.SpriteMaterial({ map: texHandOpen, transparent: true, depthTest: false });
        cursorSprite = new THREE.Sprite(cursorMat);
        cursorSprite.scale.set(2, 2, 1);
        cursorSprite.renderOrder = 999; 
        scene.add(cursorSprite);
    }

    function createEmojiTexture(emoji, fontSize=100) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = `bold ${fontSize}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 10;
        ctx.fillText(emoji, 64, 64);
        return new THREE.CanvasTexture(canvas);
    }

    function createBubbleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        
        // Pufak chizish
        const grad = ctx.createRadialGradient(64, 64, 10, 64, 64, 60);
        grad.addColorStop(0, 'rgba(255,255,255,0.1)');
        grad.addColorStop(0.8, 'rgba(255,255,255,0.4)');
        grad.addColorStop(1, 'rgba(255,255,255,0.8)');
        
        ctx.beginPath();
        ctx.arc(64, 64, 60, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
        
        // Yorqin nuqta (blik)
        ctx.beginPath();
        ctx.arc(40, 40, 15, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fill();
        
        return new THREE.CanvasTexture(canvas);
    }
    const bubbleTex = createBubbleTexture();

    function spawnBubble() {
        const radius = 1.0 + Math.random() * 0.8; // 1.0 dan 1.8 gacha
        const geometry = new THREE.SphereGeometry(radius, 32, 32);
        
        // Sovun pufagi materiali
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xffffff,
            emissive: 0x222222,
            specular: 0xffffff,
            shininess: 100,
            transparent: true, 
            opacity: 0.5,
            map: bubbleTex,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        
        const bubble = new THREE.Mesh(geometry, material);
        
        // Tasodifiy joylashuv (ekran ichida)
        const rangeX = state.worldSize.width * 0.4;
        const rangeY = state.worldSize.height * 0.4;
        
        bubble.position.set(
            (Math.random() - 0.5) * 2 * rangeX,
            -state.worldSize.height/2 - 2, // Pastdan chiqadi
            (Math.random() - 0.5) * 2 // Z biroz o'zgaradi
        );

        // Pufak ichiga sovg'a
        const rewardEmoji = REWARDS[Math.floor(Math.random() * REWARDS.length)];
        const itemTex = createEmojiTexture(rewardEmoji, 80);
        const itemMat = new THREE.SpriteMaterial({ map: itemTex, transparent: true });
        const item = new THREE.Sprite(itemMat);
        item.scale.set(radius, radius, 1);
        bubble.add(item); // Pufakka biriktirish

        bubble.userData = { 
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 0.02, 
                0.02 + Math.random() * 0.03, // Yuqoriga harakat
                0
            ),
            wobbleSpeed: Math.random() * 2 + 1,
            wobbleOffset: Math.random() * 100,
            isPopping: false
        };
        
        bubblesGroup.add(bubble);
    }

    function startWave() {
        state.wave++;
        const count = 5 + Math.floor(Math.random() * 3); // 5-7 pufak
        playSound('wave');
        
        let spawned = 0;
        const interval = setInterval(() => {
            spawnBubble();
            spawned++;
            if(spawned >= count) clearInterval(interval);
        }, 500); // Har yarim sekundda bitta
    }

    // Portlash effekti (Confetti)
    function popEffect(position, color=0xffffff) {
        const particleCount = 20;
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const velocities = [];
        
        for(let i=0; i<particleCount; i++) {
            positions.push(position.x, position.y, position.z);
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.1 + Math.random() * 0.2;
            velocities.push(
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                (Math.random() - 0.5) * 0.1
            );
        }
        
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ size: 0.2, color: color, transparent: true });
        const particles = new THREE.Points(geometry, material);
        
        particles.userData = { velocities: velocities, life: 30 };
        particlesGroup.add(particles);
    }

    function createFloatingReward(pos, texture) {
        const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.position.copy(pos);
        sprite.scale.set(2, 2, 1);
        sprite.userData = { life: 60, velocity: new THREE.Vector3(0, 0.05, 0) };
        particlesGroup.add(sprite);
    }

    // O'yin yangilanishi
    function updateGame() {
        const time = Date.now() * 0.001;

        // Pufaklar harakati
        bubblesGroup.children.forEach(bubble => {
            const vel = bubble.userData.velocity;
            bubble.position.add(vel);
            
            // Tebranish effekti
            bubble.position.x += Math.sin(time * bubble.userData.wobbleSpeed + bubble.userData.wobbleOffset) * 0.005;

            // Agar ekrandan chiqib ketsa, qaytarib tushiramiz (yoki o'chiramiz, lekin bolalar uchun aylanib yurgani yaxshi)
            if (bubble.position.y > state.worldSize.height / 2 + 2) {
                bubble.position.y = -state.worldSize.height / 2 - 2;
                bubble.position.x = (Math.random() - 0.5) * state.worldSize.width * 0.8;
            }
        });

        // Partikullar
        for(let i=particlesGroup.children.length-1; i>=0; i--) {
            const p = particlesGroup.children[i];
            p.userData.life--;
            
            if (p.type === 'Points') {
                const positions = p.geometry.attributes.position.array;
                for(let j=0; j<p.userData.velocities.length; j++) {
                    positions[j*3] += p.userData.velocities[j*3];
                    positions[j*3+1] += p.userData.velocities[j*3+1];
                    positions[j*3+2] += p.userData.velocities[j*3+2];
                }
                p.geometry.attributes.position.needsUpdate = true;
                p.material.opacity = p.userData.life / 30;
            } else if (p.type === 'Sprite') {
                p.position.add(p.userData.velocity);
                p.material.opacity = p.userData.life / 60;
                const s = 2 + Math.sin(time * 10) * 0.5; // Pulsatsiya
                p.scale.set(s, s, 1);
            }

            if(p.userData.life <= 0) particlesGroup.remove(p);
        }

        // To'lqin nazorati
        if (bubblesGroup.children.length === 0 && state.wave > 0) {
            // Hammasi portlatildi!
            ui.centerMsg.classList.add('show');
            ui.centerMsg.innerText = getRandomEncouragement();
            state.wave = -1; // Wait state
            setTimeout(() => {
                ui.centerMsg.classList.remove('show');
                startWave();
            }, 2000);
        }

        handleInput();
    }

    function getRandomEncouragement() {
        const msgs = ["AJOYIB!", "BARAKALLA!", "ZO'R!", "QOYIL!", "DAXSHAT!", "OLG'A!"];
        return msgs[Math.floor(Math.random() * msgs.length)];
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function handleInput() {
        if (!state.handVisible) {
            cursorSprite.visible = false;
            return;
        }

        cursorSprite.visible = true;
        cursorSprite.position.set(state.handPos.x, state.handPos.y, 2);
        
        // Kursor ko'rinishi
        if (state.gesture === 'PINCH') {
            cursorSprite.material.map = texHandPinch;
            cursorSprite.scale.set(1.8, 1.8, 1); // Kichrayish effekti
            ui.hintBubble.classList.remove('visible'); // Agar chimchilasa, yordamni o'chirish
        } else {
            cursorSprite.material.map = texHandOpen;
            cursorSprite.scale.set(2, 2, 1);
        }

        // Interaksiya
        mouse.set(
            (state.handPos.x / (state.worldSize.width/2)), // Taxminiy konversiya
            (state.handPos.y / (state.worldSize.height/2))
        );
        
        // Oddiyroq usul: Masofa bo'yicha tekshirish (Raycaster ba'zan aniq emas tez harakatda)
        if (state.gesture === 'PINCH') {
            let popped = false;
            for(let i=bubblesGroup.children.length-1; i>=0; i--) {
                const bubble = bubblesGroup.children[i];
                const dist = bubble.position.distanceTo(cursorSprite.position);
                const radius = bubble.geometry.parameters.radius;

                // Agar qo'l pufak ichida bo'lsa
                if (dist < radius + 0.5) { 
                    // POP!
                    playSound('pop');
                    popEffect(bubble.position);
                    
                    // Ichidagi sovg'ani chiqarish
                    if(bubble.children.length > 0) {
                        createFloatingReward(bubble.position, bubble.children[0].material.map);
                    }

                    bubblesGroup.remove(bubble);
                    state.score++;
                    ui.scoreText.innerText = state.score;
                    popped = true;
                    
                    // Score animatsiyasi
                    ui.scoreText.style.transform = "scale(1.5)";
                    setTimeout(()=> ui.scoreText.style.transform = "scale(1)", 200);
                }
            }
        }
    }

    // --- MEDIAPIPE ---
    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, ui.outCanvas.width, ui.outCanvas.height);
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            // Video uchun chizish
            drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 2});
            drawLandmarks(canvasCtx, lm, {color: '#87CEEB', lineWidth: 1, radius: 2});

            state.handVisible = true;
            
            // Koordinatalarni o'girish (three.js olamiga)
            // Video [0,1], Three.js [-W/2, W/2]
            const rawX = (1 - lm[9].x) * 2 - 1; // Markaz
            const rawY = (1 - lm[9].y) * 2 - 1;
            
            // Yumshatish (Smoothing)
            const targetX = rawX * (state.worldSize.width / 2);
            const targetY = rawY * (state.worldSize.height / 2);
            
            state.handPos.x += (targetX - state.handPos.x) * 0.3;
            state.handPos.y += (targetY - state.handPos.y) * 0.3;

            // Chimchilashni aniqlash
            const thumb = lm[4];
            const index = lm[8];
            const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
            
            if (dist < CONFIG.pinchThreshold) state.gesture = 'PINCH';
            else state.gesture = 'IDLE';

        } else {
            state.handVisible = false;
        }
        canvasCtx.restore();
    }

    let hands;
    async function initHands() {
        hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!ui.video.paused && hands) {
             hands.send({image: ui.video});
        }
        updateGame();
        renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Dunyo o'lchamini yangilash (taxminiy, camera Z ga bog'liq)
        const vFOV = THREE.Math.degToRad(camera.fov);
        const height = 2 * Math.tan(vFOV / 2) * camera.position.z;
        const width = height * camera.aspect;
        state.worldSize = { width, height };
    });

    // Boshlash
    ui.startBtn.addEventListener('click', async () => {
        ui.startBtn.innerText = "Yuklanmoqda...";
        try {
            await initHands();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
            ui.video.srcObject = stream;
            ui.video.onloadeddata = () => {
                ui.startScreen.classList.add('fade-out');
                setTimeout(() => {
                    ui.startScreen.classList.add('hidden');
                    startWave();
                    toggleMusic(); // Musiqani yoqish
                }, 500);
                ui.uiLayer.classList.remove('hidden');
                
                // O'lchamlarni olish
                const vFOV = THREE.Math.degToRad(camera.fov);
                const height = 2 * Math.tan(vFOV / 2) * camera.position.z;
                const width = height * camera.aspect;
                state.worldSize = { width, height };
                
                animate();
            };
        } catch(e) {
            alert("Kamera xatosi: " + e.message);
            ui.startBtn.innerText = "Qayta urinish";
        }
    });

    window.addEventListener('load', () => {
        initCursor();
        ui.loading.style.display = 'none';
        ui.startBtn.classList.remove('hidden');
    });

</script>
</body>
</html>
